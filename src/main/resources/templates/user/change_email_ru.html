<!DOCTYPE html>
<html lang="ru" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport"
          content="width=device-width, user-scalable=no, initial-scale=1.0, maximum-scale=1.0, minimum-scale=1.0">
    <meta http-equiv="X-UA-Compatible" content="ie=edge">
    <title>Письмо: Подтверждение смены адреса электронной почты</title>
</head>
<body style="font-family: Montserrat, Arial, Helvetica, sans-serif; background-color: #121212; background: linear-gradient(-12deg, #1d1d1d, #121212); padding: 20px;">
    <table style="font-family: Montserrat, Arial, Helvetica, sans-serif; background-color: #121212; background: linear-gradient(-12deg, #1d1d1d, #121212);" width="100%">
        <tr>
            <td align="center">
                <table style="border: 1px solid #c1b7d5; padding: 20px;">
                    <tr>
                        <td>
                            <h1 style="text-align: center; font-size: 28px; margin-bottom: 30px; color: #c1b7d5">Подтверждение смены адреса электронной почты</h1>
                            <p style="font-size: 16px; color: #fff">Подтвердите смену адреса электронной почты в сервисе VibeArt.</p>
                            <p style="font-size: 16px; color: #fff">Ваш код подтверждения:</p>
                            <h2 style="font-size: 28px; font-weight: bold; color: #c1b7d5" th:text="${verificationCode}">123456</h2>
                            <p style="font-size: 16px; color: #fff">Если вы не запрашивали это письмо, просто проигнорируйте его.</p>
                        </td>
                    </tr>
                </table>
            </td>
        </tr>
    </table>
</body>
</html>
